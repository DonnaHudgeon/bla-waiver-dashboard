<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>BLA Waiver Check-In</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F0EB; --surface: #FFFFFF; --surface-alt: #FAF7F4;
    --border: #E8E0D8; --border-strong: #D4C9BD;
    --text: #2C2418; --text-muted: #8C7E6E; --text-light: #B0A494;
    --signed: #2B8C5E; --signed-bg: #E8F5EE; --signed-border: #B8DFCA;
    --unsigned: #C44B2F; --unsigned-bg: #FCEAE6; --unsigned-border: #F0C4BA;
    --partial: #C48A2F; --partial-bg: #FFF5E0; --partial-border: #F0D8A0;
    --accent: #1A6B8A; --accent-light: #E6F2F7;
    --shadow-sm: 0 1px 3px rgba(44,36,24,0.06);
    --shadow-md: 0 4px 12px rgba(44,36,24,0.08);
    --radius: 10px; --radius-sm: 6px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
  .app { max-width: 860px; margin: 0 auto; padding: 20px 16px 40px; }
  .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo-mark { width: 38px; height: 38px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 15px; }
  .header-title { font-size: 18px; font-weight: 700; }
  .header-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .refresh-btn { display: flex; align-items: center; gap: 6px; padding: 8px 14px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); background: var(--surface); color: var(--text-muted); font-size: 13px; font-family: inherit; font-weight: 500; cursor: pointer; }
  .refresh-btn:hover { background: var(--surface-alt); color: var(--text); }
  .refresh-btn svg { width: 14px; height: 14px; }
  .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .pin-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 16px; }
  .pin-screen .logo-mark { width: 56px; height: 56px; font-size: 22px; }
  .pin-screen h2 { font-size: 20px; font-weight: 700; }
  .pin-screen p { font-size: 14px; color: var(--text-muted); }
  .pin-input { width: 200px; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-family: 'JetBrains Mono', monospace; font-size: 20px; text-align: center; letter-spacing: 8px; background: var(--surface); outline: none; }
  .pin-input:focus { border-color: var(--accent); }
  .pin-input.error { border-color: var(--unsigned); animation: shake 0.3s ease; }
  @keyframes shake { 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
  .pin-go { padding: 10px 32px; border: none; border-radius: var(--radius-sm); background: var(--accent); color: white; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; }
  .session-selector { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow-sm); }
  .session-selector-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); margin-bottom: 10px; }
  .session-pills { display: flex; flex-wrap: wrap; gap: 8px; }
  .session-pill { padding: 10px 16px; border: 1.5px solid var(--border); border-radius: 8px; background: var(--surface-alt); font-family: inherit; font-size: 14px; font-weight: 500; color: var(--text); cursor: pointer; display: flex; flex-direction: column; gap: 2px; min-width: 130px; }
  .session-pill:hover { border-color: var(--accent); background: var(--accent-light); }
  .session-pill.active { border-color: var(--accent); background: var(--accent-light); box-shadow: 0 0 0 1px var(--accent); }
  .session-pill-time { font-weight: 700; font-size: 15px; font-family: 'JetBrains Mono', monospace; }
  .session-pill-info { font-size: 12px; color: var(--text-muted); font-weight: 400; }
  .stats-bar { display: flex; gap: 10px; margin-bottom: 16px; }
  .stat-card { flex: 1; padding: 14px 16px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); box-shadow: var(--shadow-sm); }
  .stat-value { font-size: 28px; font-weight: 700; letter-spacing: -1px; font-family: 'JetBrains Mono', monospace; line-height: 1; }
  .stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-muted); margin-top: 4px; }
  .stat-card.signed .stat-value { color: var(--signed); }
  .stat-card.unsigned .stat-value { color: var(--unsigned); }
  .progress-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 20px; }
  .progress-fill { height: 100%; background: var(--signed); border-radius: 3px; transition: width 0.4s ease; }
  .all-signed-banner { display: none; align-items: center; justify-content: center; gap: 8px; padding: 14px; background: var(--signed-bg); border: 1.5px solid var(--signed-border); border-radius: var(--radius); color: var(--signed); font-weight: 600; font-size: 15px; margin-bottom: 16px; }
  .guest-list { display: flex; flex-direction: column; gap: 6px; }
  .guest-row { display: flex; align-items: center; padding: 14px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-sm); gap: 12px; }
  .guest-row:hover { box-shadow: var(--shadow-md); }
  .guest-row.status-all { border-left: 3px solid var(--signed); }
  .guest-row.status-none { border-left: 3px solid var(--unsigned); }
  .guest-row.status-some { border-left: 3px solid var(--partial); }
  .guest-row.status-noreq { border-left: 3px solid var(--border-strong); }
  .guest-info { flex: 1; min-width: 0; }
  .guest-name { font-size: 15px; font-weight: 600; }
  .guest-ref { font-size: 12px; color: var(--text-muted); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }
  .guest-pax { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 500; padding: 3px 8px; border-radius: 4px; background: var(--surface-alt); border: 1px solid var(--border); color: var(--text-muted); flex-shrink: 0; }
  .waiver-badge { padding: 5px 12px; border-radius: 20px; font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; flex-shrink: 0; white-space: nowrap; }
  .waiver-badge.all { background: var(--signed-bg); color: var(--signed); border: 1px solid var(--signed-border); }
  .waiver-badge.none { background: var(--unsigned-bg); color: var(--unsigned); border: 1px solid var(--unsigned-border); }
  .waiver-badge.some { background: var(--partial-bg); color: var(--partial); border: 1px solid var(--partial-border); }
  .waiver-badge.noreq { background: var(--surface-alt); color: var(--text-muted); border: 1px solid var(--border); font-family: 'DM Sans', sans-serif; font-size: 12px; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-state-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .empty-state-text { font-size: 14px; }
  .loading-state { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 14px; }
  .auto-refresh-bar { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 8px; font-size: 11px; color: var(--text-light); margin-top: 20px; }
  .auto-refresh-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--signed); animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
  .error-banner { padding: 12px 16px; background: var(--unsigned-bg); border: 1px solid var(--unsigned-border); border-radius: var(--radius); color: var(--unsigned); font-size: 13px; margin-bottom: 16px; display: none; }
  @media (max-width: 600px) {
    .stats-bar { gap: 6px; }
    .stat-card { padding: 10px 12px; }
    .stat-value { font-size: 22px; }
    .session-pill { min-width: 110px; padding: 8px 12px; }
    .guest-row { padding: 12px; gap: 8px; }
    .guest-name { font-size: 14px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-left">
      <div class="logo-mark">BLA</div>
      <div>
        <div class="header-title">Waiver Check-In</div>
        <div class="header-subtitle">Bonaire Landsailing Adventures</div>
      </div>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="handleRefresh()" style="display:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
      Refresh
    </button>
  </div>

  <div id="pinScreen" class="pin-screen">
    <div class="logo-mark" style="width:56px;height:56px;font-size:22px;">BLA</div>
    <h2>Waiver Check-In</h2>
    <p>Enter your team PIN to continue</p>
    <input class="pin-input" id="pinInput" type="password" maxlength="6" inputmode="numeric" placeholder="----" autocomplete="off">
    <button class="pin-go" onclick="submitPin()">Open Dashboard</button>
  </div>

  <div id="dashboard" style="display:none;">
    <div id="errorBanner" class="error-banner"></div>
    <div class="session-selector">
      <div class="session-selector-label" id="sessionLabel">Loading sessions...</div>
      <div class="session-pills" id="sessionPills"></div>
    </div>
    <div id="statsBar" class="stats-bar" style="display:none;">
      <div class="stat-card"><div class="stat-value" id="totalPax">0</div><div class="stat-label">Total Pax</div></div>
      <div class="stat-card signed"><div class="stat-value" id="signedCount">0</div><div class="stat-label">Waivers Signed</div></div>
      <div class="stat-card unsigned"><div class="stat-value" id="unsignedCount">0</div><div class="stat-label">Outstanding</div></div>
    </div>
    <div id="progressContainer" style="display:none;"><div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div></div>
    <div class="all-signed-banner" id="allSignedBanner">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      All waivers signed — good to go!
    </div>
    <div class="guest-list" id="guestList">
      <div class="empty-state"><div class="empty-state-title">Select a session</div><div class="empty-state-text">Choose a session above to see the guest manifest</div></div>
    </div>
    <div class="auto-refresh-bar" id="autoRefreshBar" style="display:none;">
      <div class="auto-refresh-dot"></div>Auto-refreshing every 2 minutes
    </div>
  </div>
</div>

<script>
const state = { pin: '', sessions: [], activeSession: null, guests: [], refreshTimer: null };

async function apiGet(path) {
  const r = await fetch(path, { headers: { 'X-Dashboard-Pin': state.pin } });
  if (r.status === 401) throw new Error('Unauthorized');
  if (!r.ok) throw new Error('API error: ' + r.status);
  return r.json();
}
async function apiPost(path, body) {
  const r = await fetch(path, { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Dashboard-Pin': state.pin }, body: JSON.stringify(body) });
  if (r.status === 401) throw new Error('Unauthorized');
  if (!r.ok) throw new Error('API error: ' + r.status);
  return r.json();
}

document.getElementById('pinInput').addEventListener('keydown', e => { if (e.key === 'Enter') submitPin(); });

async function submitPin() {
  const input = document.getElementById('pinInput');
  state.pin = input.value.trim();
  if (!state.pin) { input.classList.add('error'); setTimeout(() => input.classList.remove('error'), 400); return; }
  try {
    await apiGet('/api/sessions');
    document.getElementById('pinScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('refreshBtn').style.display = 'flex';
    loadSessions();
  } catch (err) {
    input.classList.add('error'); input.value = '';
    setTimeout(() => input.classList.remove('error'), 400);
  }
}

async function loadSessions() {
  try {
    document.getElementById('errorBanner').style.display = 'none';
    document.getElementById('sessionLabel').textContent = 'Loading sessions...';
    const data = await apiGet('/api/sessions');
    state.sessions = data.sessions || [];
    if (state.sessions.length === 0) {
      document.getElementById('sessionLabel').textContent = 'Today\u2019s Sessions \u2014 ' + data.date;
      document.getElementById('sessionPills').innerHTML = '<div style="color:var(--text-muted);font-size:14px;padding:8px 0;">No sessions found for today</div>';
      return;
    }
    document.getElementById('sessionLabel').textContent = 'Today\u2019s Sessions \u2014 ' + data.date + ' \u2014 ' + data.totalPax + ' pax';
    renderPills();
    if (state.refreshTimer) clearInterval(state.refreshTimer);
    state.refreshTimer = setInterval(() => { if (state.activeSession) loadGuests(state.activeSession); }, 120000);
  } catch (err) {
    document.getElementById('errorBanner').textContent = 'Failed to load sessions. Check API key.';
    document.getElementById('errorBanner').style.display = 'block';
  }
}

function renderPills() {
  document.getElementById('sessionPills').innerHTML = state.sessions.map(s =>
    '<button class="session-pill ' + (state.activeSession && state.activeSession.id === s.id ? 'active' : '') + '" onclick="selectSession(\'' + s.id + '\')">' +
    '<span class="session-pill-time">' + s.displayTime + '</span>' +
    '<span class="session-pill-info">' + s.orderCount + ' orders \u00B7 ' + s.totalPax + ' pax</span></button>'
  ).join('');
}

async function selectSession(id) {
  state.activeSession = state.sessions.find(s => s.id === id);
  renderPills();
  if (state.activeSession) await loadGuests(state.activeSession);
}

async function loadGuests(session) {
  const gl = document.getElementById('guestList');
  gl.innerHTML = '<div class="loading-state">Checking waiver status...</div>';
  document.getElementById('statsBar').style.display = 'flex';
  document.getElementById('progressContainer').style.display = 'block';
  document.getElementById('autoRefreshBar').style.display = 'flex';

  try {
    const bookings = session.bookings || [];
    const orderNumbers = bookings.map(b => b.orderNumber).filter(o => o);

    let waiverResults = {};
    if (orderNumbers.length > 0) {
      const wd = await apiPost('/api/waiver-status', { orderNumbers: orderNumbers });
      waiverResults = wd.results || {};
    }

    state.guests = bookings.map(b => {
      const w = waiverResults[b.orderNumber] || { found: false, size: 0, signed: 0 };
      return { ...b, waiverFound: w.found, waiverSize: w.size, waiverSigned: w.signed, waiverLink: w.requestLink || '' };
    });

    // Sort: no request first, then none signed, then partial, then all signed
    state.guests.sort((a, b) => {
      const scoreA = !a.waiverFound ? 0 : a.waiverSigned === 0 ? 1 : a.waiverSigned < a.waiverSize ? 2 : 3;
      const scoreB = !b.waiverFound ? 0 : b.waiverSigned === 0 ? 1 : b.waiverSigned < b.waiverSize ? 2 : 3;
      return scoreA - scoreB;
    });

    renderGuests();
  } catch (err) {
    gl.innerHTML = '<div class="empty-state"><div class="empty-state-title">Error loading waiver data</div></div>';
  }
}

function renderGuests() {
  const guests = state.guests;
  let totalExpected = 0, totalSigned = 0;
  guests.forEach(g => {
    if (g.waiverFound) { totalExpected += g.waiverSize; totalSigned += g.waiverSigned; }
    else { totalExpected += g.pax; }
  });
  const outstanding = totalExpected - totalSigned;
  const pct = totalExpected > 0 ? Math.round((totalSigned / totalExpected) * 100) : 0;

  document.getElementById('totalPax').textContent = state.activeSession.totalPax;
  document.getElementById('signedCount').textContent = totalSigned;
  document.getElementById('unsignedCount').textContent = outstanding;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('allSignedBanner').style.display = outstanding === 0 && guests.length > 0 ? 'flex' : 'none';

  if (guests.length === 0) {
    document.getElementById('guestList').innerHTML = '<div class="empty-state"><div class="empty-state-title">No bookings</div></div>';
    return;
  }

  document.getElementById('guestList').innerHTML = guests.map(g => {
    let statusClass, badgeClass, badgeText;
    if (!g.waiverFound) {
      statusClass = 'status-noreq'; badgeClass = 'noreq'; badgeText = 'No request sent';
    } else if (g.waiverSigned >= g.waiverSize && g.waiverSize > 0) {
      statusClass = 'status-all'; badgeClass = 'all'; badgeText = g.waiverSigned + '/' + g.waiverSize + ' signed';
    } else if (g.waiverSigned > 0) {
      statusClass = 'status-some'; badgeClass = 'some'; badgeText = g.waiverSigned + '/' + g.waiverSize + ' signed';
    } else {
      statusClass = 'status-none'; badgeClass = 'none'; badgeText = '0/' + g.waiverSize + ' signed';
    }

    return '<div class="guest-row ' + statusClass + '">' +
      '<div class="guest-info"><div class="guest-name">' + esc(g.displayName) + '</div>' +
      '<div class="guest-ref">' + esc(g.orderNumber) + '</div></div>' +
      '<div class="guest-pax">' + g.pax + ' pax</div>' +
      '<div class="waiver-badge ' + badgeClass + '">' + badgeText + '</div>' +
      '</div>';
  }).join('');
}

async function handleRefresh() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  try {
    if (state.activeSession) await loadGuests(state.activeSession);
    else await loadSessions();
  } catch (e) {}
  btn.classList.remove('spinning');
}

function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
document.getElementById('pinInput').focus();
</script>
</body>
</html>
